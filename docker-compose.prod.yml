version: '3.8'

services:
  # Backend API
  backend:
    container_name: paninos_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    # We don't expose ports globally, only to Traefik network
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DJANGO_ALLOWED_HOSTS=*
    networks:
      - paninos_net
      - easypanel
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # API Router
      - "traefik.http.routers.paninos-api.rule=Host(`api.paninos.co`)"
      - "traefik.http.routers.paninos-api.entrypoints=https"
      - "traefik.http.routers.paninos-api.tls=true"
      - "traefik.http.routers.paninos-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.paninos-api.loadbalancer.server.port=8000"

  # Frontend (Next.js)
  frontend:
    container_name: paninos_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=https://api.paninos.co
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - paninos_net
      - easypanel
    labels:
      - "traefik.enable=true"
      # Web Router
      - "traefik.http.routers.paninos-web.rule=Host(`paninos.co`)"
      - "traefik.http.routers.paninos-web.entrypoints=https"
      - "traefik.http.routers.paninos-web.tls=true"
      - "traefik.http.routers.paninos-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.paninos-web.loadbalancer.server.port=3000"

networks:
  paninos_net:
    driver: bridge
  easypanel:
    external: true
